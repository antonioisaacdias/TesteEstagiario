<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Teste Estagiário - Antonio Dias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
  </head>
  <body class="bg-light vh-100 d-flex flex-column align-items-center">
    <header class="p-3">
        <h1>Teste Estagiário - Antonio Dias</h1>
    </header>

    <main class="flex-grow-1 d-flex justify-content-center align-items-center w-100">
        <div class="card shadow" style="width: 400px;">
            <div class="card-header bg-secondary text-white text-center">
                <h2 class="h5 mb-0">Formulário de Cadastro</h2>
            </div>
            <div class="card-body d-flex flex-column justify-content-center align-items-center">
                <form id="form" class="d-flex flex-column justify-content-center align-items-center flex-grow-1 w-100">
                    <div class="form-floating mb-3 w-100">
                        <input type="text" class="form-control" id="inputName" placeholder="Nome">
                        <label for="inputName">Nome</label>
                    </div>
                    <div class="form-floating mb-3 w-100">
                        <input type="text" class="form-control" id="inputEmail" placeholder="Email">
                        <label for="inputEmail">Email</label>
                    </div>
                    <div class="form-floating mb-3 w-100">
                        <input type="text" class="form-control" id="inputPhone" placeholder="Telefone">
                        <label for="inputPhone">Telefone</label>
                    </div>
                    <button class="btn btn-primary fw-bold" type="submit">Enviar</button>
                </form>
            </div>
          </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js" integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq" crossorigin="anonymous"></script>
    <script src="index.js"></script>
  </body>
</html>
